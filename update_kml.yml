name: Update Cooling Centers KML

on:
  schedule:
    - cron: '0 10 * * *'   # 6 AM ET daily (10:00 UTC)
  workflow_dispatch:         # manual trigger anytime

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Generate KML
        run: python build_kml.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cooling_centers.kml
          git diff --staged --quiet || git commit -m "chore: cooling centers update $(date -u +%Y-%m-%d)"
          git push
